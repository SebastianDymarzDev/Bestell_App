<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>

    <link rel="icon" type="image/x-icon" href="./assets/icons/orders.svg">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/basket.css">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/media.css">
    <link rel="stylesheet" href="./styles/footer.css">
    <link rel="stylesheet" href="./styles/header.css">

    <script src="./scripts/db.js"></script>
    <script src="./scripts/template.js"></script>
    <script src="script.js"></script>
</head>

<body>
    <header>
        <div class="header_container">
            <a href="index.html"><img src="./assets/icons/Logo 02.svg" alt="Bestell App Logo"></a>
            <nav>
                <img src="./assets/icons/menu.svg" alt="Burger Button">
            </nav>
        </div>
    </header>
    <main>
        <section class="landing_section">
            <div  class="hero">
                <img src="./assets/img/hero.png" alt="Bild mit viel Essen">
            </div>
            <div class="headline_section">
                <figure class="burger_house_logo">
                    <img src="./assets/img/logo.png" alt="BurgerHouse Logo">
                </figure>
                <div class="headline">
                    <h1><span>Burger</span>House</h1>
                    <img src="./assets/img/stars.png" alt="Bewertung">
                </div>
                <h2>The best of Burgers, Pizza, and Greens, all in one great place.</h2>
            </div>
        </section>
        <section class="burger"></section>
        <section class="pizza"></section>
        <section class="salad"></section>
    </main>
    <footer>
        <div class="footer_container">
            <div class="copyright">&copy; 2025 BurgerHouse</div>
            <a href="imprint.html">Imprint</a>
            <a href="">Cookie Preferences</a>
        </div>
    </footer>
</body>

</html>
